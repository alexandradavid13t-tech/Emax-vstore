<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMAX Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="admin-body">
    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <a href="index.html" class="logo">
                <span class="logo-icon"><i class="fas fa-crown"></i></span>
                <span class="logo-text">EMAX</span>
            </a>
            <h2>Admin Login</h2>
            <p>Enter your password to access the dashboard</p>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top:10px;">
                    <i class="fas fa-lock"></i> Login
                </button>
            </form>
            <p style="margin-top:20px; font-size:0.85rem; color:var(--text-muted);">
                <a href="index.html" style="color:var(--primary);"><i class="fas fa-arrow-left"></i> Back to Store</a>
            </p>
        </div>
    </div>

    <!-- Admin Dashboard (hidden until login) -->
    <div id="admin-dashboard" style="display:none;">
        <!-- Admin Navbar -->
        <header class="admin-navbar">
            <a href="index.html" class="logo">
                <span class="logo-icon"><i class="fas fa-crown"></i></span>
                <span class="logo-text">EMAX</span>
            </a>
            <div style="display:flex; align-items:center; gap:20px;">
                <span style="color:rgba(255,255,255,0.7); font-size:0.9rem;">
                    <i class="fas fa-user-shield"></i> Admin Panel
                </span>
                <button class="btn btn-sm" onclick="logout()" style="background:rgba(255,255,255,0.1); color:white;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
                <a href="index.html" class="btn btn-sm" style="background:var(--primary); color:white;">
                    <i class="fas fa-store"></i> View Store
                </a>
            </div>
        </header>

        <!-- Admin Main Content -->
        <main class="admin-main">
            <div class="admin-grid">
                <!-- Sidebar: Add/Edit Product Form -->
                <aside class="admin-sidebar">
                    <h3><i class="fas fa-plus-circle"></i> <span id="form-title">Add Product</span></h3>
                    <form id="product-form" class="admin-form" onsubmit="handleProductSubmit(event)">
                        <input type="hidden" id="edit-product-id">

                        <div class="form-group">
                            <label for="product-name">Product Name *</label>
                            <input type="text" id="product-name" required placeholder="e.g. Premium Watch">
                        </div>

                        <div class="form-group">
                            <label for="product-price">Price (USD) *</label>
                            <input type="number" id="product-price" required min="0" step="0.01" placeholder="99.99">
                        </div>

                        <div class="form-group">
                            <label for="product-category">Category *</label>
                            <select id="product-category" required>
                                <option value="">Select Category</option>
                                <option value="electronics">Electronics</option>
                                <option value="fashion">Fashion</option>
                                <option value="accessories">Accessories</option>
                                <option value="home">Home</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="product-description">Description *</label>
                            <textarea id="product-description" rows="3" required placeholder="Product description..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Product Image</label>
                            <div class="image-preview" id="image-preview" onclick="document.getElementById('product-image').click()">
                                <div class="image-preview-text" id="preview-text">
                                    <i class="fas fa-cloud-upload-alt" style="font-size:1.5rem; color:var(--primary);"></i>
                                    <span>Click to upload image</span>
                                    <span style="font-size:0.75rem;">or paste image URL below</span>
                                </div>
                                <img id="preview-img" src="" alt="" style="display:none;">
                            </div>
                            <input type="file" id="product-image" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                            <input type="text" id="product-image-url" placeholder="Or paste image URL here" oninput="handleImageUrl(this.value)">
                        </div>

                        <div class="form-group" style="display:flex; align-items:center; gap:10px;">
                            <input type="checkbox" id="product-new" style="width:auto;">
                            <label for="product-new" style="margin:0;">Mark as New Arrival</label>
                        </div>

                        <div style="display:flex; gap:10px;">
                            <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
                                <i class="fas fa-save"></i> Add Product
                            </button>
                            <button type="button" class="btn btn-secondary" id="cancel-btn" onclick="resetForm()" style="display:none;">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                        </div>
                    </form>
                </aside>

                <!-- Main: Product List -->
                <div class="admin-products">
                    <div class="admin-products-header">
                        <h3><i class="fas fa-boxes"></i> All Products</h3>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <span id="product-count" style="color:var(--text-muted); font-size:0.9rem;">0 products</span>
                            <button class="btn btn-sm btn-primary" onclick="resetForm()">
                                <i class="fas fa-plus"></i> New
                            </button>
                        </div>
                    </div>
                    <div id="admin-products-list">
                        <!-- Products rendered by JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
